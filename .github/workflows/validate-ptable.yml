name: Validate Master P-Table Formulas

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  validate-excel-graph:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Repository Source
      uses: actions/checkout@v4

    - name: Setup Node.js Environment
      uses: actions/setup-node@v4
      with:
        node-version: 20
        cache: 'npm'

    - name: Install SheetJS and HyperFormula
      run: |
        npm install hyperformula xlsx

    - name: Execute Light Engine Formula Compilation
      run: node scripts/validate_formulas.js
