system:
  identity: "UNIVAC-IX-CORE-FABRIC"
  default_word_size: 36

gateway_configuration:
  identity: "UNIVAC-IX-GATEWAY-CORE"
  unisys_reserved_oui_prefixes:
    - prefix: "00:00:A2"
      classification: "SPERRY_UNIVAC_FUTURE_FRAME"
    - prefix: "00:10:FA"
      classification: "UNISYS_RESERVED_IOC_BLOCK"
  dynamic_switching_matrix:
    gateway_ip: "192.168.1.1"
    subnet_mask: "255.255.255.0"
    enforce_switch_mac_binding: true

sf_trunk_policing:
  target_frequency_hz: 2600
  power_magnitude_floor: 15.0
  interceptor_nodes:
    - address: "0x0013"
      label: "TELEPHONY_TRUNK_01"

# --- Communications Topology ---
telephony:
  trunk:
    ip: "192.168.1.100"
    port: 5060
  gateway:
    ip: "192.168.1.200"
    port: 161
    polling_interval_ms: 2000

# --- High-Fidelity Audio DSP Configuration ---
audio_engine:
  # Options: SENNHEISER (Neutral/Analytical) | BOSE (Warm Vocals)
  acoustic_profile: "SENNHEISER"
  # Threshold in linear amplitude (0.005 equals roughly -45dB for noise-gate suppression)
  noise_cancellation_threshold: 0.005
  # System-wide target mainframe rendering format
  default_format: "PCM_16BIT_8000"

# --- Telemetry & Electrical Threshold Lines ---
hardware_thresholds:
  expected_idle_voltage: 48
  expected_loop_current_ma: 25
  max_allowable_ren: 1.0
  line_impedance_ohms: 600

autonomous_plc_overrides:
  DRIVER_TELEPHONY_SF:
    trigger_condition: "DISCONNECTED_2600HZ_SF"
    actions:
      - vendor: "UNISYS_TERMINAL_GATEWAY"
        protocol: "VIRTUAL_SWITCH_LINK"
        target_register: "ALL_ACTIVE_NODES"
        override_hex_vector: "FF00FF00"
        label: "TERMINAL_SAFE_MODE_LOCK"
        description: "Forcibly drop routing links and isolate active Unisys virtual Mac bridges"


routing_matrix:
  source_node: "0x00FF" # Fiber Optic Trunk Line
  mirror_targets:
    - address: "0x0011"
      label: "SYS_MONITOR_INCOMING"
      description: "Internal incoming serial tracking data stream"
    - address: "0x0012"
      label: "SYS_MONITOR_SENDING"
      description: "Internal outgoing serial tracking data stream"
    - address: "0x0013"
      label: "RADIO_TRANS_RX"
      description: "External radio receiver hardware stream interface"
    - address: "0x0014"
      label: "RADIO_TRANS_TX"
      description: "External radio transmitter hardware stream interface"

recovery_handshakes:
  DRIVER_MIL_STD_1397_TACTICAL:
    trigger_keyword: "ERROR"
    reply_hex: "AA55FFFF0000" # Tactical Reset Matrix Instruction Block
    label: "TACTICAL_RADAR_RELOAD"
  DRIVER_AVIATION_KNOWLEDGE:
    trigger_keyword: "ALTITUDE"
    reply_hex: "7E01FFAA" # Telemetry Stabilization Vector
    label: "AVIONICS_AUTO_LEVEL"
  DRIVER_OTIS_GEN360:
    trigger_keyword: "BREAKDOWN"
    reply_hex: "0F0F00001111" # Force Mechanical Brake Bypass Release
    label: "OTIS_BRAKE_RELEASE"
  DRIVER_SAFETY_MONITOR:
    trigger_keyword: "CRITICAL"
    reply_hex: "DEADBEEF0101" # Master Facility Halon / Suppressor Suppression Pulse
    label: "SUPPRESSION_ENGAGE"

nodes:
  - id: "PORT_17"
    name: "Sys_Incoming_Monitor"
    type: "LEGACY_CONVERTED_SERIAL"
    port: "/dev/ttyUSB16"
    hex_address: "0x0011"
    target_module: "aegis-bridge"
    status: "ACTIVE"

  - id: "PORT_18"
    name: "Sys_Sending_Monitor"
    type: "LEGACY_CONVERTED_SERIAL"
    port: "/dev/ttyUSB17"
    hex_address: "0x0012"
    target_module: "aegis-bridge"
    status: "ACTIVE"

  - id: "PORT_19"
    name: "Radio_Transmission_In"
    type: "LEGACY_CONVERTED_SERIAL"
    port: "/dev/ttyUSB18"
    hex_address: "0x0013"
    target_module: "aviation-knowledge"
    status: "ACTIVE"

  - id: "PORT_20"
    name: "Radio_Transmission_Out"
    type: "LEGACY_CONVERTED_SERIAL"
    port: "/dev/ttyUSB19"
    hex_address: "0x0014"
    target_module: "aviation-knowledge"
    status: "ACTIVE"

  - id: "FIBER_TRUNK_01"
    name: "High_Speed_Fiber_Optic_Bus"
    type: "FIBER_OPTIC"
    port: "sfp_eth0"
    hex_address: "0x00FF"
    target_module: "aegis-bridge"
    status: "ACTIVE"

carrier_telemetry:
  frequency_matrices:
    - classification: "DTMF_DIAL_UP"
      low_group_hz: [697, 770, 852, 941]
      high_group_hz: [1209, 1336, 1477, 1633]
      min_twist_db: -8.0
      max_twist_db: 4.0
    - classification: "TELEGRAPH_MORSE_TONE"
      center_frequency_hz: 800
      dit_length_ms: 60
      dah_length_ms: 180
      inter_element_gap_ms: 60

physical_media_specs:
  broadband:
    types: ["DSL", "ADSL", "ADSL2+", "VDSL", "VDSL2"]
    vectoring_cross_talk_cancellation: true
    snr_margin_floor_db: 6.0
  copper_ethernet:
    supported_cables: ["CAT5e", "CAT6", "CAT6A", "CAT7", "CAT8", "CAT_NEXT_GEN"]
    max_packet_size_bytes: 9000 # Jumbo Frames Allocation
    auto_negotiation_speed_mbps: [10, 100, 1000, 10000, 25000, 40000, 100000]

vendor_connectors:
  oracle:
    driver: "oracle.jdbc.OracleDriver"
    pooling_max_active: 128
    failover_nodes: ["10.0.9.11", "10.0.9.12"]
  ibm_db2:
    sub_system: "HOST_EBCDIC_STORAGE_MATRIX"
    transaction_isolation_level: "CURSOR_STABILITY"
  allen_bradley:
    protocol: "EtherNet/IP"
    cip_routing_path: "1,0"
    tag_tracking_registers: ["0x00A1", "0x00B2", "0x00C3"]
  hbe:
    integration_mode: "OPC_UA_PROXY"
    heartbeat_timeout_ms: 500
carrier_telemetry:
  frequency_matrices:
    - classification: "DTMF_DIAL_UP"
      low_group_hz: [697, 770, 852, 941]
      high_group_hz: [1209, 1336, 1477, 1633]
      min_twist_db: -8.0
      max_twist_db: 4.0
    - classification: "TELEGRAPH_MORSE_TONE"
      center_frequency_hz: 800
      dit_length_ms: 60
      dah_length_ms: 180
      inter_element_gap_ms: 60

database_dumps:
  oracle:
    schema_regex: "INSERT\\s+INTO\\s+([A-Za-z0-9_]+)\\s*\\(([^)]+)\\)\\s*VALUES\\s*\\(([^)]+)\\)"
    encoding_fallback: "UTF-8"
  ibm_db2:
    schema_regex: "CREATE\\s+TABLE\\s+([A-Za-z0-9_]+)\\s*\\(([^;]+)\\)"
    ebcdic_to_ascii_forced: true

system:
  identity: "UNIVAC-IX-SUPER-FABRIC"
  default_word_size: 64 # Advanced Cray/UNIVAC Hybrid Processing Width
  operation_mode: "TOTAL_INFRASTRUCTURE_RECOVERY"

telegraph_telephony_matrix:
  baudot_ita2_set: {
    0x03: "A", 0x19: "B", 0x0E: "C", 0x09: "D", 0x01: "E", 0x0D: "F", 0x1A: "G", 
    0x14: "H", 0x06: "I", 0x0B: "J", 0x0F: "K", 0x12: "L", 0x1C: "M", 0x0C: "N", 
    0x18: "O", 0x16: "P", 0x17: "Q", 0x0A: "R", 0x05: "S", 0x10: "T", 0x07: "U", 
    0x1E: "V", 0x13: "W", 0x1D: "X", 0x15: "Y", 0x11: "Z", 0x04: " ", 0x08: "\n"
  }
  pcm_companding: "MU_LAW"
  dtmf_twist_tolerance_db: 4.0

supercomputing_profiles:
  cray_xmp_ymp:
    word_width_bits: 64
    gray_code_alignment: true
    vector_registers_count: 8
    parity_mask: "0x7FFFFFFFFFFFFFFF"

telegraphic_handshake_overrides:
  - trigger_morse_pattern: 222 # 222 = --- -> 'O' (Emergency Operational Trap)
    reply_hex_vector: "AA55FFFF0000"
    target_plc: "ALLEN_BRADLEY_CIP_01"
    label: "RADIO_OVER_WIRE_EMERGENCY_RESET"
  - trigger_morse_pattern: 111 # 111 = ... -> 'S' (SOS Facility Breach Interrupt)
    reply_hex_vector: "DEADBEEF0101"
    target_plc: "SIEMENS_STEP7_BUS"
    label: "MASTER_HALON_SUPPRESSION_ENGAGE"

carrier_telemetry:
  frequency_matrices:
    - classification: "DTMF_DIAL_UP"
      low_group_hz:
      high_group_hz:
      min_twist_db: -8.0
      max_twist_db: 4.0
    - classification: "TELEGRAPH_MORSE_TONE"
      center_frequency_hz: 800
      dit_length_ms: 60
      dah_length_ms: 180
      inter_element_gap_ms: 60
    - classification: "SINGLE_FREQUENCY_TRUNK"
      signaling_frequency_hz: 2600
      detection_bandwidth_hz: 30.0
      minimum_duration_ms: 150

system:
  identity: "UNIVAC-IX-SUPER-FABRIC"
  operation_mode: "TOTAL_INFRASTRUCTURE_RECOVERY"

sf_trunk_policing:
  target_frequency_hz: 2600
  power_magnitude_floor: 15.0
  interceptor_nodes:
    - address: "0x0013"
      label: "TELEPHONY_TRUNK_01"
      description: "Main in-band long-distance telecom network drop link"

autonomous_plc_overrides:
  DRIVER_TELEPHONY_SF:
    trigger_condition: "DISCONNECTED_2600HZ_SF"
    actions:
      - vendor: "ALLEN_BRADLEY"
        protocol: "EtherNet/IP"
        cip_routing_path: "1,0"
        target_register: "0x00A1"
        override_hex_vector: "AA55FFFF0000"
        label: "AB_FORCE_SAFETY_SHUTDOWN"
        description: "Forcibly reset Allen-Bradley CIP core register loop profiles"
      - vendor: "SIEMENS"
        protocol: "PROFINET_STEP7"
        target_register: "0x00B2"
        override_hex_vector: "DEADBEEF0101"
        label: "SIEMENS_BREAKER_TRIP"
        description: "Isolate Siemens execution bus channels to eliminate field damage"
